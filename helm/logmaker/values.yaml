replicaCount: 1

image:
  repository: logmaker
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 19999

ingress:
  enabled: false
  className: nginx
  host: logmaker.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: "1"
    memory: 768Mi

persistence:
  data:
    enabled: true
    size: 1Gi
    storageClass: ""
  plugins:
    enabled: true
    size: 500Mi
    storageClass: ""

javaOpts: "-Xms256m -Xmx512m"

nodeSelector: {}
tolerations: []
affinity: {}
