apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: logmaker
  namespace: logmaker
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: logmaker.example.com  # ← 도메인 변경
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: logmaker
                port:
                  number: 19999
